name: Agente de conteúdo (blog Cadê)

# Roda 3x por dia (08:00, 13:00 e 18:00 BRT = 11/16/21 UTC).
# Gera artigos de SEO/GEO e dá commit; o push publica na Vercel.
on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 16 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependências
        run: npm ci
      - name: Gerar artigos do dia
        env:
          # Sem chaves, o script roda em dry-run/fallback seguro.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODELO: ${{ secrets.OPENAI_MODELO }}
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODELO: ${{ secrets.PERPLEXITY_MODELO }}
          HIGGSFIELD_API_KEY: ${{ secrets.HIGGSFIELD_API_KEY }}
          HIGGSFIELD_ENDPOINT: ${{ secrets.HIGGSFIELD_ENDPOINT }}
        run: node scripts/agente-conteudo.mjs --quantos 1
      - name: Commit e push
        run: |
          git config user.name "agente-conteudo"
          git config user.email "conteudo@cadeimoveis.com"
          git add -A
          git diff --cached --quiet || git commit -m "conteudo: artigo automatico do dia"
          git push
